body:
  text: 句股引蒙卷二海寧陳訏撰開方開方為句股積冪測量步算之源其法取積實歸除使均齊方正知每邊得若干數其用籌除實視某格為某商若干等類俱如前法有平方大籌立方大籌置廉用散籌平方開面立方開體皆開除所積之實平方則開平面所積之方故大籌每格止一自乘立方則開立體所積之方故大籌每格其右邊直行先平列一自乘數其中左兩行雖有斜格而平行每格又以自乘之數與每格之一二三四五六七八九相乘蓋如圍棋子平方則四邊十九而三百六十一為十九個十九也立方則十九個三百六十一也又平方立方俱以第一次大籌除實之格為方根後各依法加廉其大籌所除之格其實即隅積其平行之數即隅數且隅積即在平廉約法中并列并除此天然之巧也凡測算雖極逺極大其所測中心止憑一點其逺近多少相距亦止憑一點從此點至彼點則有線線即有所積之面面即有所積之體故平方開面立方開體皆因其所積之面與體以求其所距之線與所測之點為句股三角之用也此所測之點非開方點定開位之點開平方法先點定開位從末單位點起如積實尾無單位者於尾位置點起隔一位點以至實首一點一開二點二開開不盡者命分一點者根必單二點者根必十俱以次增先從左大數視平方籌相近之格除之開數定則方根之十百千萬亦定矣立方同凡初商除至前第一點止次商除至前第二點止如次商點位前原止二位而籌格有三位不得除至第二點後便須置於次商為次商三商以下皆然初商法平方籌取近少除實至前第一點止在第幾格即為初商若干此第一次除之商數名為方根點前無餘者從籌上一二三格之單位除點前有餘者從籌上四五六七八九格之雙位除如實少於籌者用退位法除次商法以初商所得數倍之為廉以所倍之廉數列籌於平方籌左取某格近少除之為次商若干三商法以次商所得數倍之為廉列籌於次商籌之右平方籌之左除實同前法各商同此每商置定位三則開方定位依點遞加不用順尋逆尋法立方同三商式如列實三點為三開從末零位點起每開一位點前無餘該大籌單位除實三格內除九為初商三寫三字在首點積實之二上三九次商應倍初商之三列六號籌為廉除實若取近少莫如三格但次點位前實止有二位而籌有三位不得除至次點位後便須置是為次商得寫於次點位積實上隔籌於平方籌左三商既列六號籌籌於平方籌之左便應統取近少除至末點位止今四格恰除盡為三商得四寫四於末點位積實之上三商根必百故初商之三為三百四商式點前無餘大籌單位除九初商得三書商數及置與三商俱同前法四商倍三商之四列八號籌於大籌之左及前六號籌與籌之右四格除盡為四商四四商根必千故初商之三為三千四商式初商視平方籌取三格除九為初商得三次商倍方根列六號籌於表左應除至次點位止但次點前實止一位而法之一格兩位下俱三位便須置隔籌於前列籌右平方籌左為次商得三商應除至三點位止但三點前止三位取近少在三格法有四位便須置隔籌於前列籌右平方籌左為三商得四商四格恰除盡為四商得四四商根必千故初商之三為三千加籌凡商除之後如兩廉必倍前商之數如前商一加二號籌前商二加四號籌之類此易明惟前商五倍之加一十則加一號號兩籌蓋五加一籌籌方是一十若不𢃄籌則一為單數矣若前商之廉是十數又當為升籌升籌凡商除之後如有加兩籌者當用升籌法蓋同位則升也如平方三開其初商二是為二百次商倍之為廉是四百應列四號籌矣其次商六是為六十三商倍之為廉是一百二十似應再列一號二號籌於前商四號籌之右然從四號籌挨次而來似乎四百一十二而非倍六十之一百二十矣故應將一百與四百併之為五百連二十為五百二十升作五二籌列於平方籌左而前商之四號籌去之隔籌每商必加倍數籌以為廉法故前商既置矣亦須隔籌於前列籌之右以為後商之廉法而取近少除實為後商其前列籌固倍數也而不必倍者蓋置一只應隔一籌耳立方每隔兩籌與平方異命分見前籌算法視末商籌之第一格為若干分視所餘不盡之實命為若干分之若干分如餘積五十七如末商兩廉列八號四號籌連前商籌在內視第一格八四一命為八百四十一分之五百七十分蓋第一格是兩廉每加一分之全數故止視第一格而命其全數與現在不盡之分也求分杪凡有開不盡者或不命分欲知若干分杪於餘實下增兩位為則多開一位而分杪可得矣平方隔一位點是每開兩位故增右皆開平方法其平方帶縱者開方附左平方𢃄縱列積實依開方商除法每商除實得商數以乘縱數除餘實其次商倍初商數除實以次商數乘縱數除餘實但倍商不倍縱餘商同法合每商之數為闊即正方加縱數即𢃄縱之長方如縱數有比例可求者先以比例分其積而餘積以平方開之得闊因以知其長開方得闊加縱式假如長田六百二十四步闊不及長二步初商得二除四百步又以商數二乘縱二步二二如四除四十步餘一百八十四步又倍初商列四號籌次商四格除一百七十六步又以商數四乘縱二步二四如八共一百八十四步除盡為次商四開得闊二十四步加縱二步為長二十六步比例分積式假如直田積四百五十步長多闊一倍法平分其積得二百二十五步平方開之得闊一十五步倍之得三十步即長假如長田積二百五十二步長比闊多四分分母之三分子法以分子三加分母四共七為法以分母四乘積為實法除實得一百四十四步開方得闊一十二步又以闊一十二步七因四除之得二十一步為長長比闊多九步較之十二步為四分之三開立方法從末單位點起每點隔二位視列實位一點一開二點二開餘同凡一點者方根必單二點者方根必十以次而增先從列實左大位視立方籌取近少除之點前無餘除一二格之單位點前餘一除三四格之十位點前餘二除五六七八九之百位立方根單其積實必從單至幾百止如九之所積其平面自乘得八十一而立體則九與八十一相乘得七百二十九故根單必積實至百位而單位點起隔兩位至百也立方根十其積實必從幾千至幾萬幾十萬止如九十之所積其平面自乘得八千一百而立體則九十與八千一百相乘得七十二萬九千故根十其積實必從千位萬位至十萬位止而點亦隔兩位也餘以類推立方積實必得三位故一點一開二點二開而開數定於此矣一點者根必單二點者根必十方根定於此矣初商除至左首點位止次商除至次點位止置肇於此矣若尾位列實止於十則實右補一列實止於百則實右補以便從單位點起若列實不至單位止則點位一錯而開數方根置俱因之以錯矣故列至單位開方之異於籌除者在此初商法同平方視列實用立方大籌視單位十位百位依法取近少除之至前首點位止在第幾格為初商若干為方根次商以初商方根自之即自乘又三倍自乘之實得若干列某號籌於立方籌之左為平廉法再以初商方根竟三倍之列某號籌於立方籌之右為長廉法視平廉籌及大籌某格近少列為平廉約數將平廉約數在某格之隅數即大籌兩行平寫之數乘立方大籌右之長廉如九格之八一為隅數即將長廉籌八格一格所列之數依大小次併之得若干數為長廉約法併平廉長廉兩約數若干以減初商所餘之實至次點位止為次商若干如併兩廉數浮於實須退位改商如位多於實應置不得除至次點位後右立方有平廉三長廉三與平方異三商去前商左右列籌以初商兩商自之又三倍之為平廉列籌於立方籌左再以初次兩商竟三倍之為長廉列籌於立方籌右如前商法除至三點位止四商以下皆同去前商籌依法列平廉長廉籌除至末點位止為四商若干如尚有餘實依命分法右前法俱前商之後即將前各商數自之又三倍之為平廉列籌視某格與餘實近少列為平廉約數再以前各商竟三倍之為長廉列籌俱依前法分列大籌左右視平廉約數在某格之隅數取以乘長廉得若干數為長廉約數其萬千百十各依位數附於平廉之本位併之而除餘實其隅數即在大籌之除格其廉積即在散籌之每格仍是於全數中除兩廉應除之餘實而隅數亦不煩再乘再除也梅定九先生籌算仍依古法先以前商三倍之為廉法以前商數自之又三倍之為方法以方法除餘積得次商既得次商用其數以乘方法為三平廉積又次商自乘以乘廉法為三長廉積再以次商為隅法以隅法自乘再乘得小立方形為隅積三共併之除餘積不知既列籌除則籌之每格即乘有廉之全積何必多此一乘且大籌在初商為方根在每商即為隅積今用籌並除何必又自乘再乘耶立方籌右行隅數定位二開次商三格以上是單位四格以下是十位三開三商三格以上是單位四格以下是十位次商三格以上是百位四格以下是千位四開四商三格以上是單位四格以下是十位三商三格以上是百位四格以下是千位次商三格以上是萬位四格以下是十萬位右隅數以末商三格以上是單四格以下是十起層纍遞加法式二開商式假如積實六千八百五十九兩點兩開兩點根必十點前無餘從單位點俱隔二位連本位共三位初商列立方大籌視第四格之六四雖係近少然點前無餘必從單位除寧可在第一格除一蓋第二格雖亦單位然八浮於六不可除實故除一格之一為近少除去一千為初商一兩點根必十此初商一為方根一十次商以方根一十自之又三倍自乘之實得三百列三號籌於立方籌左為平廉籌又以方根竟三倍之得三十列三號籌於立方籌右為長廉籌前商餘實五八五九視平廉籌之九格三四二九相近列為平廉約數其九格之隅數八一乘長廉之三十得二千四百三十為長廉約數併兩廉約數共五千八百五十九除實盡在第九格為次商九次商在九格除盡即次商隅數九亦在除內蓋隅在長平兩廉相湊之角故次商之隅即同次商之商數其在大籌之第幾格者為隅之邊數而在第幾格之自乘者為隅之實數今與大籌並列同除故隅亦在其中也三平廉貼於前商方形之正面側面及或上或下而後成四方平等之方故次商先以方根自乘者乘平廉一面之全數也三倍之則所貼方根三面之平廉全數也但全數與方根等方而全數之積多於現在之餘積故於此三平廉全數中視某格與餘實近少而為平廉約數然此三平廉者與方根闊狹厚薄相等今三面貼湊止能悉照方根之方而不能湊合成方根外加廉之方故又有長廉三一縱二橫補於平廉不能合縫之際始得湊合成方法以方根又三倍之者成三個長廉之全數也再以平廉之隅數乘長廉則為現在平廉貼身應得之數為長廉約數併之除餘實而隅亦在所除之中而此四面之方湊合無缺矣蓋平廉以方根為準長廉以平廉為準而隅數與平廉長廉又互相為準數藏大籌巧在與大籌並列同除法精密矣初商次商退位除式假如積實一萬九千六百八十三初商二十積實兩點兩開方根必十點前餘一位應從立方籌之十位除實但籌之三格四格俱大於積實應退在第二格之八除八千籌格退位餘一一六八三此退位不用三四格除實而退至二格者籌數浮於實數用退位除恰除至點位止故取二格之八為近少也此初商止退籌格不退商位次商七先以方根二十自之得四百又三倍之得一千二百取一號二號籌列立方籌左為平廉以方根二十竟三倍之得六十取六號籌列立方籌右為長廉雖九格一萬一千五百二十九相近然再加長廉便浮於實故不取九格凡平廉籌格與除至點位之實位數相當者則萬千十百之數亦必相符今點位前實係一萬一千六百八十三平廉九格恰五位便是一萬一千五百二十九矣蓋二開次商得九以九乘平廉法得廉約數一萬八百加隅約數七百二十九共數如前以此推算即得實數然不如即視位數更為簡捷故比點位少一位則其數必小多一位便須置也八格之一五一二雖更相近然若以八格之隅數六十四乘長廉之六十得三千八百四十併平廉八格之一五一二為一萬四千三百五十二亦浮於現在之餘實故又應退格取七格之八千七百四十三單為平廉約數取七格之四九隅數乘長廉之六十得二千九百四十為長廉約數俱係千數可併進而除首位次位之一一矣於是併兩廉約數共一萬一千六百八十三單除盡為次商七此退格約廉因籌數雖浮籌位不多於餘實故止退格而不改商也自乘再乘還原次商置式三商加籌式假如積實一億二千九百五十五萬四千二百一十六三點三開點前餘二位初商點前餘二位視立方大籌百位除實第五格之一二五近少除之得初商五百次商以方根五百自之得二十五萬又三倍之得七十五萬為平廉列七號五號籌於立方籌左以方根竟三倍之得一千五百為長廉列一號五號籌於立方籌右若取平廉籌相近莫如第六格之四五二一六相近然次商應除至次點位止今籌位多實位少若依籌位即平廉巳除至點位後何况更有長廉是必變商之大位為小位則有後商點前之實應除而不患除至點位之後故應商數置為次商前二商式是退格併亷此處次商是退位再商故有置不置之别三商因前平廉籌巳備三廉實數尚未商除而前商之又無實數可三倍故不去前籌不將前商自之又三倍之止於立方籌左前平廉籌右加兩籌蓋立方每點隔二位今加籌則前商變為後商變次商之十為三商之單矣故平廉籌仍照前七十五萬而七五列籌之第六格之四百五十萬相近又立方大籌六格之二百一十六單共四五二十六列為平廉約數再以隅數之三六在三開次商為三千六百者今為三開三商之三十六見前隅數定位以之乘三倍方根之一千五百為五萬四千列為長廉約數併之共四百五十五萬四千二百一十六除餘實盡為三商六右共開方得五百六自乘再乘還原五開三商列籌不隔商數置式四商隔籌式又商數置式五商又隔籌式假如積實一萬七千三百一十八億即萬萬九千百九十一萬六千七百二十九按他書十萬曰億算學書萬萬曰億後同五開列實如左五點五開五點根必萬點前無餘從單位初商點前無餘從立方籌單位一格除實一萬億為初商方根一萬次商以初商一萬自之得一億又三倍之得三億列三號籌於立方籌左為平廉以方根一萬竟三倍之得三萬列三號籌於立方籌右為長廉視第二格之六八近少為平廉約數以此三號籌二格之隅數四乘長廉之四得一二為長廉約數按隅數五開次商三格以上是百萬位併之除七千二百八十億為次商二千三商以前初商除一萬億次商除七千二百八十億餘實三八九九一六七二九去前所列籌以初次兩商共一萬二千自之得一四四又三倍之得四三二列籌於立方籌左為平廉凡乘大數各存餘位則從單位逆推乘數定位不紊上圖如兩商一十二萬自之得一億四千四百萬再以初次兩商一萬二千竟三倍之得三萬六千列立方籌右為長廉法如法列兩廉約數取近少莫如九格三八九五二九但三商應除至三點位止今籌格六位而第三點前連點位亦止四位法實不符應商除退位不但變大數商為小數商又有後商點前之實可合籌格之多位應本商置為三商百四商立方凡前商置則後商應隔兩籌以當每點之隔二位列於平方籌左前商平廉四三二號籌之右為平廉再如法列長廉籌取兩廉約數併除餘實又莫如九格三八八七二九但五開四商應除至第四點止今第四點之前止七位而籌格有八故又應置為四商十五商依立方法後商應去前商之廉籌另依商法置平長兩廉籌約數除實今前三四兩商俱未除實俱退商數置有今五商仍存前商廉籌及籌再加籌以當每點之隔二位列於立方籌左廉籌及籌之右為五商之平廉仍用九格之三八八八七二九為平廉約數此約數首位三係十億位再以九格之隅數八十一五開五商次格以下是十位乘長廉之三萬六千得二百九十一萬六千為長廉約數併之除餘實至五開尾點位止為五商九右五商共一萬二千九末商平廉長廉三八八八七二九二九一六併之三八九九一六七二九右五開式末商九是單數凡立方積不過至十位百位止今何以能除至三十八億九千百萬各位之多蓋三商四商雖兩商無除而無定位列實未除之三八九萬即皆前商平廉之所應有之數改商而未嘗改廉但因籌數位多實數位少故知三四商之皆應置而前商未除之平廉其約數仍在至五商則但以五商之隅數乘前商原有之長廉以為長廉約數蓋隅因亷為升降而亷依方限不因商為升降特借五商之九同格並除非單九能除至十億位也立方帶縱方為闊加縱為長法與開方無異先視某格與方根近少為商數乘縱數再乘得縱積併入方積以減原實為初商次商以下更加縱積縱廉積除餘實為次商餘商同併兩商數得闊因闊以知長用點定開位悉依立方縱積除至點後如初商視立方大籌某格近少之格數取為方根依定位列於原實之下又以方根之數因縱數若干即以因得之數再乘方根數得若干為縱積依定位列方根之下併減原實為初商若干按方根悉如開方法但未即除實如併縱積多于原實應退位或改商或退格在方根不可除至點後其併縱積則除至點位之後蓋縱在立方之外積非立方之積不可以每點之位為定也如次商列平廉長廉法悉如立方先取平廉約數依定位列餘實之下再取長廉約數列平廉約數之下次以次商之商數有兩廉約數在某格即某格是商數因縱數得若干再以商數乘之為次商縱積依定位列兩廉約數之下又以縱數倍之為縱廉法乘初商數得若干以乘得之數與次商數乘之得若干為縱廉積依位列於約數之下共併之減原實為次商若干右𢃄縱方兩開者次商之平廉必列至次點位止如有三開者則加縱積縱廉積除至次點位之後與開方不同止兩開者即併積亦必次點位止若併積之位浮於餘實應退格改商以除實若平廉各格多於點前之實或應退格或應置同前開方置法三商以下列廉法悉如前其縱廉法應乘上初商次商再以乘得之數乘末商為縱廉積併除實四商以下同如積實九萬七千二百十尺但云闊不及長三尺初商近少在四格即方根四十闊不及長三尺即三為縱法乘初商之四十得一百二十此縱靣再以初商四十乘一百二十得縱積四千八百此縱體先以方根積六萬四千照位列實下又以縱積四千八百列方根積之千位下併之得六萬八千八百減原實為初商四十餘實二萬八千四百不先除方根者恐加縱積多於原實故先併後除次商以方根四十自乘得一千六百尺又三倍之得四千八百為平廉列大籌左再以方根四十竟三倍之得一百二十為長廉列大籌右取平廉第五格二四一二五為近少為平廉約數以五格之隅數二五乘長廉之一百二十得三千兩開次商四格以下隅數是十為長廉約數列於平廉下之千位以縱法三尺乘次商五得一十五再以五乘一十五得七十五為次商縱積照定位列於兩廉之下又以縱法之三竟三倍之得六為縱廉法乘次商四十得二百四十再以二百四十乘次商五得一千二百為縱廉積照定位列於縱積之下併之共除餘實二萬八千四百盡為次商五右共開方四十五尺加長三尺為長四十八尺如積實二百萬尺但云闊不及長三尺三點三開初商是百點前無餘初商一在大籌單位除實以三為縱法乘商數一百得三百此縱靣又以商數一百乘三百得三萬此縱體合方根積共一百三萬減積實為初商闊之一百按此初商除方根并除長三尺之縱但止除方根等形之縱未除次商後加縱廉積之縱次商依立方法平廉三萬長廉三百取近少三格九二七以相近因𢃄縱有縱積應加故退格約廉二格之六八相近為平廉約數以第二格隅數四三開次商三格以上是百位乘長廉得一十二萬為長廉約數以縱法三尺乘次商二十取平廉長廉約數俱在二格即是二十得縱面六十又以商數二十乘縱面六十得縱積一千二百以縱法三尺倍之得六為縱廉次商方根加廉則所𢃄之縱亦應加廉但次商之縱是小於方根加廉之縱而非短於方根之縱止縱旁兩邊有廉而縱頂無廉故法止倍之乘初商一百得六百即以六百乘次商二十得縱廉積一萬二千併之平廉約數六十萬八千長廉約數一十二萬縱積一千二百縱廉積一萬二千共七十四萬一千二百減餘積仍餘二十二萬八千八百十單為次商二十三商平廉三千二百長廉三百六十依開方法置籌取第五格近少二十一萬六千一百二十五為平廉約數以第五格隅數二十五乘長廉三百六十得九千為長廉約數以縱法三尺乘商數五得一十五又以商數五乘一十五得七十五為縱積以縱廉六縱法三尺倍之得六乘初次兩商之一百二十得七百二十又以七百二十乘三商五得三千六百為縱廉積依法併之共二十二萬八千八百除實盡為三商五右共開方一百二十五尺加縱三尺為一百二十八尺按立方𢃄縱初商未開之前其所開之方未有定數而縱長三尺則有定數然雖有定數而如三開者其方闊必等於每開立方之邊或匾縱或長縱故每商必先依開方法開本身立方之方再以縱之三尺乘商數得縱之面更以商數乘縱之面而得縱之積在初商無廉故止併方根積與縱積除實為初商若干也至於次商則方根有廉而所立之方其形更大於方根今𢃄縱方則其長雖定於三尺而其方之大小應與次商之方相等但立方之廉有三而此𢃄縱方則縱首無廉止應兩旁有廉故廉止於二但此兩廉亦止如方根之方其合縫之處亦如立方平廉之不能湊合必有一長廉焉於是以縱法乘次商而得𢃄縱長廉之面又以次商商數乘縱面而得𢃄縱長廉之積此所謂縱積也其實乃𢃄縱之長廉積也于是𢃄縱之兩平廉以縱法倍之即以乘初商之數為𢃄縱平廉之面以此𢃄縱平廉之面乘次商商數而得𢃄縱平廉之積於是所𢃄之縱其縱則定於三尺而其方之形與次商之方等矣蓋其法與開立方同而立方則先有平廉後有長廉今開所𢃄之縱乃先有長廉後有平廉此為異耳至三商與次商同惟縱廉積以縱法乘初商次商之商數而以乘得之數再乘三商之商數蓋必連初商次商再乘三商方是三商𢃄縱之平廉其廉比初商次商較薄而其方之形則初商次商後之三商其闊狹與三商有廉之方相等其理一也附立方減縱法假如立方積五千七百七十六尺但云長不及闊三尺點前無餘除單格初商除一格之單位因二格之八浮於列實故止除一格之一為商數以三尺為縱法乘商數一十兩點根必十得三十再以三十乘商數一十得縱積三百以初商方根積一千減去縱積三百餘七百以減原實為初商一十餘實五千七十六尺次商依開立方法列平廉長廉籌近少取三號籌次商以初商自之又三倍之之九格三千四百二十九為平廉約數以隅乘長廉得二千四百三十尺為長廉約數合之為五千八百五十九其數稍浮於實者立方積也後以縱積等減之乃成匾方形故凡減縱之末商必約數浮於實以待後減為立方兩廉約數次以縱法三尺乘次商九得二十七尺為縱面又以次商九乘縱面之二十七得二百四十三尺為立方減縱之長廉積今名縱積次以縱法三尺倍之得六尺為縱廉以乘初商一十得六十即以六十乘次商九得五百四十尺為立方減縱之兩平廉積今名縱廉積合縱積縱廉積共七百八十三尺以減立方之兩廉約數餘廉積五千七十六尺減餘實盡為次商九此餘廉積即前立方兩廉不浮之約數蓋既先于前所稍浮之立方廉約中除縱廉等積則所餘者乃方根應有各廉之真數因本商未除故末後除之而合也右共開得闊一十九尺減長不及闊三尺為十六尺長以上𢃄縱方開法初商方根積必至首點位止次商平廉長廉共約數必至次點位止不得除至點位之後惟減縱每商之廉其約數應稍浮于列實以待後減縱廉等積句股引蒙卷二
