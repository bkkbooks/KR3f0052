body:
  text: 句股引蒙卷三海寧陳訏撰句股法句股名義直者為股橫者為句斜者為弦句股併減名義句股和句與股相併句弦和句與弦相併股弦和股與弦相併句股較句與股相較句弦較句與弦相較股弦較股與弦相較弦和和弦與句股和相併弦較和弦與句股較相併弦和較弦與句股和相減弦較較弦與句股較相減右和較等名凡句股書多用此以從簡便故備列於前庶一覽瞭然句股弦準數句三股四弦五句股弦無一定之數然必先有一定相差之數以參互之為千變萬化之準則不外乎句三股四弦五而變化由此起焉後俱依此立法句股求弦句自乘股自乘兩積實相併開方得弦句股各自乘之實必合弦自乘之實故併積開方得弦按句股開方俱平方後同如句三自乘得九股四自乘得一十六併之共二十五平方開之得五即弦五句弦求股句自乘弦自乘兩積實相減開方得股股弦求句股自乘弦自乘兩積實相減開方得句弦自乘之積實必合一句一股自乘之積實故於弦積內減句積開方得股於弦積內減股積開方得句如弦五自乘得二十五為弦積內減句積九餘一十六為股四之積若弦積減股積一十六餘九為句三之積俱用開方得所求較求股弦句自乘股弦較自乘兩積實相減倍較為法除之得股股又加較得弦句積中除股弦較之積則所餘必倍於股之長故以倍較為法除餘積得股之長如句三自乘得九減弦長於股之較一積亦一則餘積八必倍於股長故倍較一為二除之得四即得股四若不倍較為法但以較除相減之餘積則除較之外必尚存倍於股長之數故於減餘之積去較折半亦得股長如句餘積八以較一除之仍是八必倍於股四故去較又折半亦得股四以上二法於股之長加較即得弦於股之長減較即得句故不再立求句法股弦和求股句自乘以股弦和為法除之得數以減股弦和折半得股股弦和內減股即得弦股弦和除句則所得數必弦長於股之較數故於股弦中去弦長於股之較則股弦等長而折半得股如股四弦五共九除句積九得一即股四弦五之較一去較一存八則弦與股齊故折半得股四句弦和求句股自乘句弦和自乘兩積實相減折半以句弦和為法除之得句句弦和內減句即得弦句弦和自乘之積必倍於句與句弦和相乘之積而尚多一股積故於和積內減股積則所餘者為句乘句弦和之倍積故折半使止存一句乘句弦和之積而以句股和為法除之得句如股四自乘得一十六句弦和自乘得六十四內減十六餘四十八折半餘二十四以句三弦五為法除之得三為句句既得即於句弦和除句得弦五句弦和求弦股自乘以句弦和為法除股積得數加句弦和折半得弦於弦之長減句弦較亦即得句句弦和除股積則所得之數即弦長於句之較數句較既得則加句弦之長使句長與弦長等故折半得弦如股四自乘得十六以句弦和八為法除之得二加句弦和之八為一十折半即弦五句股和求句股弦自乘句股和自乘兩積實相減再以餘積減弦積以平方開之加句股和半之得股股內減商數得句句股和之積幾倍於弦積止少一句股之較積故以句股和積與弦積相減再以減餘之積減弦積則所存者為弦長於股之較積於是開方得較而再加句股和則句股等長故折半得股如句三股四得和七自乘得四十九以弦自乘得二十五減之存二十四再以二十四減弦積之二十五存一為弦長於股之較積開方仍得一加句股和共八折半得股四股得亦可依法得句按此所得之較乃句股較作股弦較者誤句股弦較求句股弦句弦較乘股弦較倍積實開方加股較得句句加句較得股股又加股較得弦如句弦較二乘股弦較一仍得二倍之得四開方得二加股較一得句三於句三加股較一得股四於股四又加股較一得弦五句股弦和求句股弦句弦和乘股弦和得積實倍之開方減股弦和得句減句弦和得股減句股和得弦如句三弦五為句弦和八乘股四弦五之股弦和九得七十二倍之為一百四十四開方得一十二合句股弦之長於一邊矣故於十二減句弦和八得股四於十二減股四弦五之股弦和九得句三於十二減句三股四之句股和七得弦五句股求容方句股相乘以句股併為法除之得容方徑若句股較為法除之亦得容方徑按若勾股較二句有誤容方外餘句餘股相乘平方開之亦得容方徑以容方徑自乘得實以餘句為法除之得餘股以餘股為法除之得餘句句股相乘之實為容方者四斜弦內為容方者兩故容方之實必等於餘句餘股之實雖長短不齊極致而句伸則股縮股伸則句縮有參互之準此即測望之法所由起也句股求容圓句股相乘倍積實併句股弦為法除之得容圓徑句股相乘併句股弦減半為法除之亦得容圓徑圓周恆三倍於圓徑而句股弦之長恆兩倍於容圓之周故于句股相乘之稍或倍之而併句股弦為法或不倍之而以句股弦折半為法俱得容圓徑而容圓徑即弦和較也按勾股之長兩倍於容圓周語誤句股論李之藻句股弦三合成形錯綜立義句股相減其差曰較句股相併其名曰和股弦之差曰股弦較句弦之差曰句弦較併句股與弦較其差曰弦和較句股之差與弦相減其差曰弦較較股弦相併曰股弦和句弦相並曰句弦和句股之差併弦曰弦較和句股弦併曰弦和和句股各自乘併之為弦實故開之得弦句弦自乘減餘為股實故開之得股股弦各自乘減餘為句實故開之得句句股和自乘倍弦實相減開其餘即句股較也句股較自乘以減倍弦實開其餘即句股和也併句弦以除股實得句弦較若以句弦較除股實即得句弦和矣併股弦以除句實得股弦較若以股弦較除句實即得股弦和矣句股和自乘減弦實除以弦較較得弦較和矣除以弦較和非即弦較較乎句股較自乘減弦實除以弦和和則得弦和較矣除以弦和較非即弦和和乎句乘股為實併句股為法除得容方徑句乘股倍之併句股弦除之得容圓徑而容圓之徑即弦和較也又錯綜論之句為主以加股弦較即弦較較以減股弦較即弦和較若加弦較和又即股弦和也股為主以加句弦較即弦較和以減句弦較即弦和較若加弦較較又即句弦和也句股較為主以加股弦較即句弦較若減股弦和亦即句弦和也句股和為主以加股弦較復得句弦和若減股弦和亦得句弦較也至若諸較諸和法相因配連綴減半恆得所求若取句股較以加句股和半之得股以減句股和半之得句若取股弦較以加股弦和半之得弦以減股弦和半之得股取句弦較者以加句弦和半之得弦以減句弦和半之得句取弦和較者以加弦和和半之得和以減弦和和半之得勾股弦取弦較較者以加弦較和半之得弦以減弦較和半之得較加減乘除圓變不滯神而明之存乎其人逺近髙深方圓弧矢準此而推亦在乎熟之而已解注以句三股四弦五為準句股和自乘倍弦實相減開其餘即句股較如句三股四和七自乘四十九如弦五實二十五倍之五十以四十九減五十餘一即句三股四之較一句股較自乘以減倍弦實開其餘即句股和如句股較一以減倍弦實之五十餘四十九開方得七即句三股四之和七併句弦以除股實得句弦較如句三弦五併之得八以除股四之實一六得二為句三弦五之較二句弦較除股實即得句弦和如句三弦五之較二以股四之實一六除之得八為句三弦五之和八併股弦以除句實得股弦較如股四弦五併得九以句三之實九除之得一為股四弦五之較一以股弦較除句實即得股弦和如股四弦五之較一以句三之實九除之為股四弦五之和九句股和自乘減弦實除以弦較較得弦較和如句三股四之和七自乘得四十九減弦五之實二十五餘二十四以句股差一與弦五相減之弦較較四除之得六為句股之差一與弦五併之弦較和六除以弦較和即得弦較較如二十四以弦較和之六除之得四為句股之差一減弦五之弦較較四句股較自乘減弦實除以弦和和則得弦和較如句三股四之較一自乘仍得一減弦五之實二十五為二十四以句三股四弦五之弦和和除之得二為併句三股四與弦五較之弦和較除以弦和較即弦和和如二十四除以弦和較之二得一十二為句三股四弦五相併之弦和和句股測望論唐荆川先生句股所謂矩也古人執數寸之矩而日月運行朓朒遲速之變山溪之髙深廣逺凡目力所及無不可知蓋不能逃乎數也句股之法橫為句縱為股斜為弦句股求弦句股自乘相併為實平方開之得弦句弦求股句弦自乘相減為實平方開之得股股弦求句同法蓋一弦實藏一句一股之實一句一股之實併得一弦實也數非兩不行因句股而得弦因股弦而得句因句弦而得股三者之中其兩者顯而可知其一者藏而不可知因兩以得三此句股法之可通者也至如逺近可知而高下不可知如卑則塔影髙則日影之類塔影之在地者可量而人足可以至於戴日之下而日與塔髙低之數不可知則是有句而無股弦三者缺其二數不可起而句股之法窮矣於是有立表之法蓋以小句股求大句股也小句股每一寸之句為股長幾何則大句股每一尺之句其長幾何可知矣此以人目與表與所望之高三相值而知之也人目至表小弦也人目至所望之髙大弦也又法表為小股其髙幾何與至塔下之數相乘以小句除之則得塔髙蓋橫之則小股至塔之積縱之則為小句至塔頂之積縱橫之數恰同是變句以為股因橫而得縱者也句股弦三者有一可知則立表之法可得而用若其高與逺之數皆不可知而但目力可及如隔海望山之類則句股弦三者無一可知而立表之法又窮矣於是有重表之法蓋兩表相去幾何為影差者幾何因其差以求句股亦可得矣立表者以通句股之窮也重表者以通一表之窮也其實重表一表也一表句股也無二法也句股容方圓論凡竒零不齊之數準之於齊圓準之於方不齊之圓準於齊之圓不齊之方準於齊之方句股容圓準於句股容方假令句五股五弦七有竒此為整方均齊無較之句股其容方徑該得句之半蓋容方積得句股全積四分之一其取全積時句股分在兩亷則句五股五五五二十五內一半為句積一半為股積其求容方則併句股為縱一亷得十為長之數得闊二五與原句相半蓋始初則一半句積一半股積橫列之而為正方及取容方則股積在上句積在下而為長方矣其容方所以止得半句者則以句股之數均也若句短股長則容方以漸而闊不止於半句矣故大半為股積小半為句積其始橫列時句積與股同長而不同闊其縱列時則股積之闊如故而句積截長以為闊則闊與股積同而長與股積異與橫列正相反此變長為闊而取容方之法也其謂之句積股積者從容方徑與句股相乘之數而名之也若取容圓徑則用句股自之而倍其數以句股與弦併為法蓋容圓之徑多於容方方有四角與弦相礙故其數少圓弦宛轉故其數多若以求容方與求容圓相比則積中恰少一假圓徑與半弦和較相乘之數弦和較者句股併與弦相較之數也假令句五股五相乘亦倍之得五十如求容方則亦倍句股為法得二十亦恰得二寸五分之徑如求容圓則不用倍句股為法而用一句股併與一弦是以一弦代一句股並也以一弦代一句股併恰少一弦和較加一弦和較則亦兩句股矣假令一句股得十倍句股得二十是取容方之徑一句股得十一弦得七恰少弦和較三是取容圓之徑其所以少一弦和較者圓徑多於方徑也假令取容圓不用句股倍積而止用句股本積則宜句股併為亷而除去半弦和較亦得或約得圓徑之後與半弦和較相乘添積而以句股併為亷不除亦得或用句股倍積用兩句股相併為亷而以全弦和較與約得圓徑相乘添積亦得此改方為圓之妙其機括只寓之於弦和較間也至於句股積與弦積亦只於句股較中求之蓋數起於參伍參伍起於畸零不齊也假令句五股五齊數之句股則句股冪倍之即得弦冪蓋兩句股積而成弦積也至於句短股長相乘之積則成一長方倍之而弦側不當中徑亦不成弦冪維以一句股較積補之乃能使長方為一正方而得弦積蓋句股之差愈逺則長方愈狹長方愈狹則句股之差積愈多故句股差者所以權長方不及正方之數以相補輳此補狹為方之法也右荆川先生論句股測望論句股求容方圓詳矣盡矣愚按句股測望即句股求容方法而變化用之但容方則以句股求容方而測望則以容方求句股非有二法也蓋凡平方形若中間十字界之則為容方者四若斜弦界之則此一半平方之內其為完全容方者一而完全容方之外兩角凑成亦必與此完全之容方相等此就句股等長而言也至句股不必等長而同此一容方則句長者股必短股長者句必短亦千變萬化自有一定之盈縮也於是通之為測望之法以表代容方邊以表前積實代容方之積實若所容為長方則必句短股長若所容為匾方則必股短句長股為縱為髙句為橫為逺以或句或股為法除之即得所求之或髙或逺故望髙測逺即變化於句股求容方之一法也測量法句股之術可御髙深廣逺法本周髀中法用表測西法用矩測立表測高設甲㸃為髙自丙至乙逺二丈求甲乙髙幾何法依地平線立一丈之表為丁丙逺乙二丈與地平為直角凡立表以線垂下試之三靣附表即與地平為直角依地平線退行八尺為辛巳巳為人日望處人目以下六尺若立竿為準亦可視己丁甲三㸃令成斜弦以丁丙表一丈減己戊人目以下之六尺餘丁辛四尺與等戊乙之巳庚二丈八尺乘之得一十一丈八尺為實以等戊丙之巳辛八尺為法除之得甲庚一丈四尺加等己戊人目以下之庚乙六尺得甲乙髙二丈按此以丁辛與已庚相乘得實以巳辛為法除之得甲庚之髙即已以上之髙若以丁辛乘壬庚得實以已辛為法除之得甲壬之髙即丁以上之髙附西法三率算術西法三角八線全用三率算術其法詳三角前此先附其略三率算術詳西法三角八線書中其法同類為比例列一二三四率而二率三率相乘得實一率為法除之四率為所求之數凡言以者為一率言比者為二率言若者為三率言與者為四率如前立表測髙以己辛小句比丁辛小股若己庚大句與庚甲大股一率己辛八尺為法二率丁辛四尺與三率相乘得實三率己庚二丈八尺四率庚甲一丈四尺加庚乙人目以下得甲乙髙按右法以己庚為三率故得己以上之髙即甲庚之髙若以丁壬為三率則得丁以上之髙即甲壬之髙變而通之若以之測遠以小股辛丁比小句己辛若大股或甲庚或甲壬與大句大股甲庚即大句庚己大股甲壬即大句壬丁總之同類比例以二率三率相乘得實以一率為法除之即得所求之四率也餘詳本法後省文依西法以比若與不更列三率立表測深測逺設甲乙為壁立深谷甲至丙廣二丈七尺求甲乙深幾何法依甲丙線於地立六尺之表為戊丁距丙五尺人目從表端戊窺乙使戊丙乙三㸃成斜弦直線以丁戊六尺與甲丙二丈七尺相乘得一十六丈二尺為實以丁丙五尺為法除之得甲乙深三丈二尺四寸是為以丙丁小句比丁戊小股若丙甲大句與甲乙大股設井一口其徑甲乙五尺欲測深幾何法立表於井口為戊甲髙五尺從戊視丙截甲乙徑於己得四寸減井徑五尺餘己乙四尺六寸以乘戊甲五尺得二千三百寸為實以甲己四寸為法除之得乙丙井深五丈七尺五寸是為以己甲比甲戊若己乙與乙丙又法以己甲比甲戊若甲乙之丙丁與丁戊設地平有甲㸃不知其逺人目在乙髙丙地六尺求丙甲逺幾何法依地平立丁表於戊高四尺五寸距丙九尺人目從表端窺甲令乙丁甲成斜弦直線次以乙丙六尺減丁戊表四尺五寸餘乙己一尺五寸乃以乙丙六尺乘等丙戊之己丁九尺得五十四尺為實以乙巳一尺五寸為法除之得丙甲逺三丈六尺是為以乙己比己丁若乙丙與丙甲重表測髙測逺測深設不知髙之逺不知逺之髙各得幾何欲測甲乙之高而不知逺欲測丙乙之逺而不知髙用重表法先求甲乙之髙於丙地立丁丙表高十尺退後五尺立竿於戊高四尺人目在巳視表末令己丁甲成斜弦直線次從丁丙前表退後十五尺立癸壬表亦髙十尺退後八尺立竿於子亦高四尺人目在丑視表末令丑癸甲成斜弦直線以癸壬表減人目丑子四尺餘癸辛四尺與兩表相距舊名表間等丙壬之丁癸十五尺乘之得九十尺為髙實以等丙戊之寅巳減等壬子之辛丑八尺餘卯丑較三尺為法舊名影差除高實得甲辰髙三十尺是為以丑卯比辛癸若癸丁與甲辰加等癸壬表之十尺得甲乙總髙四十尺次求丙乙之逺以等寅巳之辛卯五尺與表間相距之丁癸十五尺乘之得七十五尺為逺實亦以寅巳與辛丑之較卯丑三尺為法除之得等丙乙之丁辰二十五尺是為以丑卯比卯辛若癸丁與丁辰右測量法積實除實余昔刻句股述繪圖系說已詳其數兹不再贅錢唐毛宗旦扆再氏著九章蠡測於測望法論西法比例之理尤明晰詳盡今併録於左毛扆再氏曰測量之理知逺而不知髙以逺測髙知髙而不知逺以髙測逺若髙逺兩不知所謂無逺之髙無髙之逺必用重表測之也既有等髙之二表皆十尺又有等髙之二人目竿皆四尺則甲庚丑大句股形內必函大小六句股形其甲辰丁形為甲庚巳之分形兩形之比例必等丁寅巳形亦甲庚巳之分形兩形之比例亦等甲辰丁及丁寅巳兩形之比例既皆等於甲庚巳是甲辰丁與丁寅巳兩形之比例亦等矣後表所得甲辰癸與癸辛丑形之比例皆等於甲庚丑亦同此論夫丁寅巳之比例既同於甲辰丁而癸辛丑之比例亦同於甲辰癸則辰丁與寅巳必若辰癸與辛丑反之則辰癸與辰丁必若辛丑與寅巳也今辰癸與辰丁之較為丁癸而辛丑與寅巳之較為卯丑則卯丑與丁癸兩較之比例則必俱等於各線相當之比例即可知辰丁與寅巳皆句及甲辰與丁寅皆股俱若兩較之丁癸與卯丑矣法置辛癸乘癸丁為髙實而以丑卯除得辰甲者是借丑卯與癸丁之比例因寅丁以求辰甲也寅丁與辛癸等又置卯辛乘癸丁為逺實而以丑卯除得丁辰者亦借丑卯與癸丁之比例因巳寅以求丁辰也巳寅與卯辛等辰甲為表外之髙丁辰亦表外之逺設不知廣之深不知深之廣重表測之各得幾何如甲乙丙丁壁立之谷既不知深又不知廣先求乙甲之深自谷岸乙㸃退行四尺至戊地立人目表為巳戊髙二尺七寸依乙岸窺谷底丙㸃令巳乙丙成斜弦直線次於谷旁立表為壬乙髙五尺復依巳戊線立人目表為辛戊髙八尺二寸人目依壬表末望丙令辛壬丙成斜弦直線以辛戊八尺二寸減壬乙表五尺餘辛庚三尺二寸再與巳戊二尺七寸相減餘辛癸較五尺乃以等巳戊之癸庚二尺七寸與壬表五尺乘之得一百三十五寸為深實以辛癸較五寸為法除之得乙甲深二丈七尺是為以辛癸比癸庚若壬乙與乙甲次求甲丙之廣以等戊巳之庚壬四尺與壬乙表五尺相乘得二十尺為廣實亦以辛癸較五寸為法除之得甲丙廣四丈是為以辛癸比庚壬若壬乙與甲丙設甲乙不知逺以矩尺即木工曲尺測之欲知甲乙之逺先立丙表於甲與地平為直角次以矩尺內直角加於丙表之末以丙戊尺向逺視乙令丙戊乙成斜弦直線次從丙丁尺視巳以甲丙表自乘而以甲巳相距之逺為法除之得甲乙之逺是為以巳甲比甲丙若甲丙與甲乙則丙甲為連比例之中率按矩尺為直角形若兩邊等平則甲丙表兩平地之句必等今矩尺一昻一俯則巳甲必小於丙甲而丙甲必小於甲乙故以巳甲比丙甲若丙甲與甲乙蓋皆以小比大以小大同類為比例而不執句股縱橫為同類故三率法應二率三率相乘而此用二率自乘而以一率為法除之非另有連比例之中率也若變而通之以丙子比子戊若丙甲與甲乙西法矩度測量矩度代表度有直景倒景有一矩測重矩測積實與為法除悉如中法亦可三率法求之造矩度用堅木或銅版為之依上圖從矩極均分十二度陳䃤庵止用一十度省一乘法或每度更細分之從通光耳視所測相參直以權線所切何度何分比例推算與立表測量等變景法景即直景倒景也變景者視權線所切直景不變而倒景必變為直景也一矩測量即倒景可不必變而重矩測量則倒景必變其法以矩度自乘如矩度十二自乘得一百四十四為矩冪以景度即權線所切之度如幾度幾分則矩度景度通照幾分度分之為法除之其變景之理詳句股述直景必高多逺少如一象限人望四十五度半象限九十度以上權線必切直景倒景必髙少逺多如一象限人望四十五度以下權線必切倒景變景者變倒景之少度為直景之多度蓋測物愈逺則矩愈平其權線所切必在倒景故必變之如上丁戊變乙壬也矩度測髙直景以矩度乘逺得積實以景度為法除之設所測不知其髙距所逺三十尺權線切直景八度法以矩度十二與逺三十相乘得三百六十為積實以直景八度為法除之如籌算檢八號籌視某格與積實近少除之得四十五尺為矩乙角以上之髙即所測之髙是為以小句景度比小股矩度若大句逺與大股髙倒景以景度乘逺得積實以矩度為法除之設逺六十尺權線切倒景七度又五分度之一法以景度七通五分之得三十六分以乘逺六十得積實二千一百六十以矩度十二通五分之得六十為法除之得三十六尺為矩乙角以上之髙此倒景不必變但變其法以景度乘逺以矩度為法除之亦同是為以小句比大句若小股與大股重矩測髙測髙先不知其逺則用重矩如重表測法前矩直景後矩直景以矩度乘表間得積實以兩景較為法除之表間即懸矩之幹兩矩相距之間設前直景五度後直景十度兩矩相距十尺法以矩度十二乘表間十尺得一百十尺為實以兩景較五度為法除之得二十四尺為矩乙角以上之髙以小句比小股若大句與大股同前首條前矩直景後矩倒景以矩度乘表間得積實以倒景變直景與前直景較以景較為法除之設前直景十一度後倒景九度兩矩相距二十二尺法以矩度十二乘表間二十得二百四十為積實又以倒景九度為法除矩冪一百四十四得變景十六與前矩直景較餘五為法除積實得四十八為矩乙角以上之髙是為以小句景較比小股矩度若大句表間相距與大股所測之髙前矩倒景後矩倒景將兩倒景俱變為直景仍以矩度乘表間得積以兩變景較為法除之得所測之髙同前按測望即容方求餘句餘股法其矩測之倒景必變者蓋立表測髙人目退望使參相直若所測愈髙則人目距表愈近所測愈低則人目距表愈逺表即容方之邊而人目退望之處即餘句也今矩之甲角愈髙則倒景反多矩之甲角愈低則倒景反少故必變景而後合於人目退望之餘句余舊刻句股述論之詳矣但舊刻於前後俱倒景一條誤以景較乘逺以矩度為法於三率以小句比大股若大句與大股法不合若依前一表測髙所切倒景之法亦以景度乘逺矩度為法則此兩倒景巳俱變直景矣豈可仍用倒景法乎特為改正測逺按測無髙之逺先用重矩測得髙巳壬次以矩度甲為一率以後矩所變之景乙戊為二率以高巳壬為三率即得四率之逺是為以小股甲乙比小句乙戊若大股巳壬與大句壬乙右高巳壬得四八變景乙戊得一六矩度甲乙十二度依三率法得逺六十四蓋倒景既變直景則甲乙戊成直角小句股形與巳壬乙之直角大句股相等故用三率比例以測髙法還原設逺六十四尺倒景一六矩度一二以矩度乘逺六四以變景度一六為法除之得高四八與前重矩測高第二條相合按重矩測無高之逺西法測量法義同文算指俱未論及錢唐毛扆再氏補論一則但干支字樣與圖互異且比例之法辨晰各較相比似不若竟以甲乙戊之小句股比巳壬乙之大句股尤易曉然便於初學故創為此圖測深設井口或徑廣十二尺求至水面深幾何用矩度視深辛使甲巳辛參相直視權線在直景乙戊三度以矩度十二乘等庚巳之辛壬水面十二尺得一百四十四尺為實以乙戊三度為法除之得巳壬深四十八尺是為以乙戊比乙甲若壬辛與壬巳設池面不知廣就池岸設垂線至水得一丈三尺測廣幾何權線切倒景丁戊三度依法變為直景四十八度以乘巳壬十三尺得六百二十四尺為實以甲乙矩度十二為法除之得庚巳廣五十二尺是為以甲乙比乙癸若巳壬與等壬辛之巳庚又倒景不變以矩度乘巳壬得積以倒景丁戊三度為法除之亦得巳庚廣五十二尺按倒景必變直景若止一矩測廣則倒景亦可不變然在直景則景度乘深而矩度為法除之若在倒景則矩度乘深而景度為法除之固兩不相混也至於測髙則必矩度乘取積實而景度為法除之此兩矩測一定不易之法也附三率算術古名異乘同除西法變為三率原有丁戊股十四尺丙戊句十一尺二寸今截丁乙股十尺求乙甲截句幾何西法三率一率以原有股十四尺為法二率比原有句十一尺二寸相乘為實三率若今截股十尺四率與求得截句八尺法除實所得術以原股比原句若截股與截句凡言以者為一率言比者為二率言若者為三率言與者為四率二率三率常相乘為實一率為法除實故名三率而求得之數為四率按西法三率算術専為比例之用如右所求在截句則以原股比原句若截股與截句如所求在截股則以原句比原股若截句與截股又如所求在原句則以截股比截句若原股與原句再如所求在原股則以截句比截股若原句與原股隨所比例各視所求而以同類比之如前測望諸法或以小句比小股若大句與大股或以大句比大股若小句與小股之類其縱橫大小不相紊亂後三角法悉依此術縱橫大小相為比例而又線與線為類邊與邊為類法益加密矣勾股引蒙卷三
