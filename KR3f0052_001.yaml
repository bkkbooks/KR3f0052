body:
  text: 句股引蒙卷一海寧陳訏撰筆算古用珠算今資毫穎凡寫法俱左為大右為小其法不外加減乘除其用視籌格加如先有幾百幾十尺舉尺以例其餘又幾百幾十幾尺又幾十幾尺俱平寫寫完用橫畫為界併之從末小位起每留零數寫於本位每滿十數即於前位加一點其前位同先所寫數又所加一點直下併之留零數進十數如前法一路併向左去凡滿十者不論或百或千或萬總之左位比本位多十倍俱稱為十也假如一百三十四尺又九十六尺又一百七十八尺四六八八從末位併起如四六八為一十八進一點于前左位留八零數寫本位三九七此三九七同所進一點併之得二十進兩點于前左位而本位無零置一一四此首位有一一又連兩點併之得四竟寫四字於下右共四百八尺從左首位至末小位減先從左大位減至右末小位假如四百八尺先減一百七十八尺存二百三十尺八四三四三四三二一又減九十六尺存一百三十四尺如右如再減若干亦同此法乘有自乘如以一百七十八乘一百七十八有相乘如以一百七十八乘九十六之類依位數畫或方或長格各管所乘之位為縱橫式俱左為大右為小又每格斜界從末小位界起為斜式亦左為大右為小斜界之末格為最小之位無可併進其餘斜界一路併去留零數於本位而以滿一十者進一點於前滿二十者進二點如前加法倒併至左寫完看末位應是尺是寸逆推而上即得所乘之萬千百十假如自乘以一百七十八乘一百七十八先寫一七八於上平寫再寫一七八於側直寫依平位側位畫縱橫格或平位多畫長方格或側位多畫直方格再畫斜格末小位起先從右邊末位乘起以末位之八乘平寫之末位八得六十四寫六字於末位斜格之左寫四字於右再以右邊之八乘平寫中位之七得五十六寫五字於下格斜界之左寫六字於右再以右邊之八乘平寫首位之一得八寫八字於下格斜界之右以上右邊之八乘完次以右邊中位之七乘平寫末位之八得五十六寫五字於中位斜格之左寫六字於右次以右邊之七乘平寫中位之七得四十九寫四字於中格斜界之左寫九字於右次以右邊中位之七乘平寫之一得一七如七寫七字於中格斜界之右以上右邊之七乘完又以右邊之一乘平寫末位之八得八寫八字於上位斜格之右次以右邊之一乘平寫中位之七得七寫七字於上位斜格之右次以右邊之一乘平寫首位之一得一寫一字於上位斜格之右以上右邊之一乘完各位俱乘畢將斜界各數併之圖具右方右末位是尺乘尺即知四字是尺從尺逆推而上至三字是萬位得三萬一千六百八十四尺若以尺乘寸則末位之四是四寸凡兩錢斤之類俱同此假如相乘圖算俱同自乘除除與減相似而不同猶加與乘亦相似而不同蓋加減止用小九數如二與三為五而乘與除則兩字合呼如二三得六也除即九歸法列籌除實西法始創先列籌式如左籌算附籌式籌每副九根每根九格左為大數右為小數以第一格右邊字為某號籌如一字即為一號籌二字即為二號籌算時照為法之數列籌從左而右看列實數近少除之其每籌之背俱合九數面一背必八面二背必七第九號籌之背則虛界斜格無字為法數之用其除法用法另詳右每籌九格每格已備所乘之數如一號籌一一如一一二如二如第二號籌則第一格即一二如二第二格即二二如四第三格即二三如六第四格即二四如八第五格即二五得一十此一十之一字寫在斜格之左為大數第六格即二六得一十二以一字寫斜格之左二字寫斜格之右凡籌俱左為大數右為小數也其列籌亦分左大右小如法數或係一十九則一號籌列左九號籌列右也凡兩籌相並成斜方格右每籌九格每格已備所乘之數如一號籌一一如一一二如二如第二號籌則第一格即一二如二第二格即二二如四第三格即二三如六第四格即二四如八第五格即二五得一十此一十之一字寫在斜格之左為大數第六格即二六得一十二以一字寫斜格之左二字寫斜格之右凡籌俱左為大數右為小數也其列籌亦分左大右小如法數或係一十九則一號籌列左九號籌列右也凡兩籌相並成斜方格其斜方格內之數須合併算滿十即進於左位而留零數於本位其在斜方外者不可合也除取近少除即珠算之歸法如以物求價物為法照物之數列籌價為實共若干價橫寫數目亦左邊起寫至右邉視列籌某格近少除之如在第一格除即寫一字如在第二格除即寫二字為商除之數所以取近少者蓋以法除實必非一除可盡故留餘實以便再除假如做工三百八十四丈用銀三千五百七十一兩二錢求每丈該銀若干以做工為法列三八四籌以銀為實橫寫三五七一二取格之近少除之右列三八四號籌除實視每格自一格至八格俱少惟九格之三四五六與實近少除之因在第九格為初商九餘實一一五二視列籌第三格之為十一進一點于前一一五二除實盡為次商三按初商之九寫於實首位者因在三號籌左邊之字除起左邊是大數即是十位遇十在本身故第一次除寫實之第一位所謂在本身也右工每丈該銀九兩三錢按定位詳後凡法小實大者從實首順尋法首而法前得令如工三百較之銀三千是為法小實大應實上順尋法首今實之第二位是百即為法之首位而法前得令則實之第一位是法前而第一位上之初商九乃是九兩蓋令者兩斤尺石之所由起也九既為兩則三為錢無疑故貴定位也詳後法置開方置不用此法逢單須進位遇十在本身退位單仍十兩一位還升各籌俱右為單位左為十位其左邊無字而兩籌斜格相併如五與六併為一十一之類則進於十位亦謂之十也此進位之位與本身之身俱指所商之數應寫實數上之第幾位如初商在第一位次商在二位之類為一定之位而進位則從本位而進於左位也依此寫法有不相連接中間空一位者是商數大小相懸應置也退位單仍十句即補首句逢單須進位之所未盡蓋如同是籌上之單位除實而所除之實位或有用退位除者則雖在籌右格之單位除仍作遇十在本身其所寫商數初商在首位次商在次位也假如實一十一兩七錢二分法二十三石列籌列三號三號籌視五格至九格俱浮於實惟退位除則第四格之九二是零數與一之大數相近故從實首除籌之一十為九除十而於次位還一則所除乃在第二位而書商數於實首位是為單仍十耳然次位除起而實首書商數則依然逢單進位也兩一位還升句承上退位句以申明逢單須進位也謂惟退位除者雖單亦同十耳若實首是一法首亦是一而恰用第一格除實則逢單應書商數於實首一之前位上蓋總以籌之左大右小為逢單遇十故前句是退位除者雖在單格亦作十論而在本身置商此句兩一是雖或一十一百而在籌格之單位除者亦作單論而在本身前一位置商也假如實一百五十七兩法一百二十六石列一二六籌在第一格右小位除實則應置商於實本位之前一位若法實俱是一在左大格除者不宜進位置商假如實一七八二法一八列一八籌初次商俱在九格除實俱籌上併進左大位是十位是遇十在本身其商數不宜進位也右依前法寫商數而中間空缺不接連者即位也定位法小實大順尋法首而於法前得令假如人參三十五兩用價共二百二十七兩五錢求每參一兩價若干以銀為實以參為法五列三號五號籌此即參為法除實七籌第六格除二十一是遇十在本身寫五二六字於實之第一位上餘實一七五除第六二五格亦遇十在本身寫五字於實之第二位上除盡順尋法首者如上所列實二百二十七兩五錢人參為法是三十五兩則十為法首而實之第二位是十為法首位直上所寫商數之五即法首位而法前得令令者兩也實首直上之六為法前法前得令為六兩六既為兩則五為錢矣答曰每參一兩價銀六兩五錢法大實小逆尋法首而於法前得令假如堤工三百五十用銀二十二兩七錢五分求每一工該銀若干以銀為實以工為法列三號五號籌除實同前法之首是百實之首乃是十是為法大實小當實首十逆推法首百則實之前位即法首位而實前第二位是法前位以之得令為兩而順遞推下則初商之六乃是分位次商之五乃是釐矣答曰每人一工該銀六分五釐又如法愈大實愈小則實前逆尋法首或二三四法前得令同前假如隄三千四百工共銀一十五兩三錢求每工該銀若干以銀為實以工為法實列三號四號籌除實三初商四次商五俱籌上左邊除實商數各依遇十在本身寫法數千銀數十為法大實小從實首十數逆尋法首則實前二位為法首而又於法前得令起兩退右挨數則實首上之四為四釐挨右之五為五毫矣答曰每工四釐五毫法實等者實首即為法首而於法前得令法實相等如同是千同是百之類命分凡除至單位而止故曰實如法而一所謂一者即單也其除之至單位仍有不盡之餘實則以分命之其一除之至盡如錢分釐毫絲忽以次求之其一以法數為分母不盡者為分子命為幾分之幾假如十九人分銀二百五十四兩依商除法已各該一十七兩矣不盡七兩命之曰十九分兩之七蓋以不盡之七剖為七個十九分得一併百三十三分以十九人分之各得七分整數零數為每人分得十七兩十九分兩之七附約法厯法用之便於積算餘可不必凡命分可約者約之古法曰可半者半之不可半者以少減多更相減損求其有等者以等約之西法謂之紐數以等數約母子數則皆除盡如八十一人分銀二十七兩不能各得一兩并不能各得五錢依命分法命為八十一分兩之二十七今以法約之為三之一蓋八十一是三個二十七若剖兩為八十一分即各得二十七分是三之一也均分法曰置分母八十一用遞減法以分子二十七減之餘五十四復以二十七減之餘仍二十七兩數相同是有等也即用此二十七轉除分母得三除分子得一如此不用細分但以每兩均剖為三而各得其一分即三人共一兩也若分子是五十四則用轉減法以子五十四轉減母八十一餘二十七又以母餘二十七轉減子五十四亦餘二十七是相等也即以此等數二為法除母得三除子五四得二是為約得三之又捷法八十一乃九九相乘之數二十七乃三九相乘之數皆九也即可為紐數約之為九分兩之三當位籌算求兩斤尺石之類竟除近少或即除盡不用當位法惟開方每商後應取兩廉約數故如餘實一百先取長廉時雖或籌之第一格是一百寧可取第九格除九十以便取長廉也今開方依西法用籌故先附此右各法俱籌算入門之始從此開方句股三角握算推步無慮紊悮矣惟開方置與此不同句股引蒙卷一
