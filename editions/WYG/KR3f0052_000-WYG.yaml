body:
  text: 勾股引蒙天文算法類二算書之屬提要臣等謹案勾股引蒙五卷國朝陳訏撰訏字言楊海寧人由貢生官淳安縣教諭是書成於康熈六十一年壬寅首載加減乗除之法雜引諸書如加法則從同文算指列位自左而右減法則從梅文鼎筆算列位自上而下易横為直乗法則用程大位算法統宗鋪地錦法畫格為界除法則用梅文鼎籌算直書列位至定位則又用西人横書之式葢兼採諸法故例不畫一至開帶縱平方但列較數而不列和數開帶縱立方但列帶一縱而不列帶兩縱相同及帶兩縱不同皆為未備所論勾股諸法謂勾股和自乗方與絃積相減所餘之積轉減弦積為股弦較不知以勾股和自乗積與倍弦積相減所餘為勾股較積不得為勾股較也又謂勾股相乗以勾股較除之亦得容方不知既用勾股容方本法以勾股和除勾積股相乗矣則用此一勾股相乗之積而勾股和與勾股較除之皆得容方無是理也又謂勾股相乗之積為容方者四斜弦内為容方者兩不知勾股形内以弦為界止容一方試以勾三股四之容方積較尚不及勾股積四分之一而股愈長則容方愈小者更無論矣又謂勾股弦之長恒兩倍於容圓之周不知平圓積以半周除之而得半徑勾股相乗積以總和除而得半徑根既不同不得牽混為一也如斯之類亦多未協其三角法則全録梅文鼎平三角舉要畧加詮釋所用八線小表以餘線可以正弦正切正割三線加減得之故不備列其半徑止用十萬亦測量全義所載泰西之舊表無所發明然算法精㣲猝不易得其門徑此書由淺入深循途開示於初學亦不為無功觀其名以引蒙宗㫖可見録存其説亦足為發軔之津梁也乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書句股引蒙海寜陳訏撰凡例六藝數居其一句股又九章之一古周髀積羃今三角八線皆句股法也但不得其門每多望洋是編如蒙童初識之無漸至握管作文或析其數或明其理為入門之始故名勾股引蒙自籌算法行珠算可廢至専用筆算籌亦似可不用宣城梅定九先生有筆算一書備極諸用然其要不過加減乘除四字今止發其端餘不辭費葢全帙中皆加減乗除故也籌算剙自逺西較珠算最為雅便但定位置殊費推􅃻今有訣法有假如簡明易曉庶無悞用并列製籌之法用時即不必􅂝籌便楮可代數學之有開方為勾股之所必需平方易立方難今不厭其詳務使開卷易明至𢃄縱方雖於勾股法不恒用然法尤㣲奥不可不知故併載焉勾股為測量諸法之原變化神妙不外叅互一定之數今載唐荆川先生論李凉菴水部論為註釋數條足以括其變化有志之士亦在熟之而已測量法西刻備有成書實與中法無異但文義簡奥是編顯淺明晰且先列中法後列西法知中法自有勾股以來未嘗禮失而求諸野但製器之巧當推西法耳三率為西法比例所通用凡三角法皆三率法也今附測量之末三角法之前一覽瞭然俾習者易如反掌三角法即測量全義中所載測三角直線法至梅刻三角舉要尤明顯矣今備錄梅本而於取邊取線之所以然或附管見或補圖明之三角八線必檢表得度雖弧三角即西法三角曲線與平三角㣲有不同未可據平三角遽為步厯之準然算三角若不得表將何印証但八線表未能備刻今附八線小表雖具體而微然與八線全表無異元李欒城測圓海鏡明顧箬溪為之注釋宣城梅定九先生謂止容圓一術引而伸之遂如五花八門想昔時視為絶學今昌運作人算學設館肄習然天府之書無從窺見即梅刻諸書亦購覓甚難是編不辭固陋視李顧二書似各法具備且由淺入深人易曉悉譬之江河濫觴之始可涓涓不已以至於海云爾
