body:
  text: 勾股引蒙卷四海寧陳訏撰三角法八線全圖周天三百六十度兩分之為半周四分之為一象限每一象限各九十度又名弧度六凡正方角乙即直角即象限之角其所對弧必九十度凡在一象限不及九十度者為鋭角如丙凡過一象限多於九十度者為鈍角凡言角以中一字為所指之角如甲乙癸凡求某角者求其角之對弧度與分凡求某角即本角之弧矢弦割切為正其外為餘凡半徑為全數為一八線有增減半徑無増減常為十萬弧中旋轉可如弦如句凡正角以半徑全數為正弦凡鈍角以外角之正餘弦為正餘弦直角即正方角一名勾股形有角有邊求餘角餘邊直角之一假如壬癸丁勾股形有丁角五十七度壬丁弦九十一丈八尺求餘角餘邊先求癸丁邊術曰以半徑全數比丁角之餘弦若壬丁弦與癸丁句一率原設弦半徑一為法二率原設句丁角五十七度餘弦五四四六四相乗三率今有弦壬丁邊九十一丈八尺為實四率今所求句癸丁邊五十丈法除實得所求右三率法後同半徑即乙丁餘弦即甲丁求壬癸邊以半徑比丁角之正弦若壬丁弦與壬癸股一率原設弦半徑一二率原設股丁角五十七度正弦八三八六七三率今有弦壬丁邊九十一丈八尺四率所求股壬癸邊七十七丈求壬角以丁角五十七度與象限九十度相減得餘三十三度為壬角右例先得弦以求勾股假如壬癸丁勾股形有丁角六十二度癸丁勾二十四丈求餘角餘邊求壬角以丁角六十二度與象限相減得餘二十八度為壬角平面弧止容一正方角兩鋭角今既有勾股形癸則於一象限内減丁角之度其餘度自必壬角戊丙丁勾股形以戊丙切線為股丙丁半徑為勾戊丁割線為弦是丁角原有之線今壬癸丁勾股形與戊丙丁勾股形既同丁角則其比例等求壬丁邊以半徑比丁角之割線若癸丁勾與壬丁弦一率原設勾半徑一二率原設弦丁角六十二度割線二一三五三率今有勾癸丁邊二十四丈四率所求弦壬丁邊五十一丈一尺求壬癸邊以半徑比丁角之切線若癸丁勾與壬癸股一率原設勾半徑一二率原設股丁角六十二度切線一八八七三三率今有勾癸丁邊二十四丈四率所求股壬癸邊四十五丈一尺右例先得勾以求弦及股或先得股以求弦及勾亦同按半徑隨弧旋轉無有増減故可為弦為勾為股各隨比例之所取用視邊與線之縱横小大為比例有邊求角直角之二假如壬癸丁勾股形有壬丁弦一百二丈二尺癸丁勾四十八丈求二角一邊求丁角以丁壬弦比癸丁勾若半徑乙丁與丁角之餘弦甲丁一壬丁邊一百二丈二尺二癸丁邊四十八丈三半徑一四丁角餘弦四六九六六以所得餘弦檢表得六十二度為丁角度右壬角癸角俱止一邊無兩邊不能以邊比邊為以線比線之例惟丁角有兩邊故先求丁角得丁角而丁角度之八線即可為餘角之比例矣然丁角必求餘弦為四率者蓋若求正弦正切之股則壬癸無邊可例若求正割則雖可以癸丁邊比壬丁邊若餘弦甲丁與正割壬丁之例然餘弦尚未求得又無可為比故以壬丁弦比癸丁句若乙丁弦之半徑與甲丁勾之丁角餘弦相比例也宣城梅定九氏曰得其角度則諸數歴然可於無句股中尋出勾股余亦曰知四率應求之線之故則一率二率三率瞭然可於無比例中尋出比例矣求壬角以丁角六十二度與象限相減得餘二十八度為壬角求壬癸邊以半徑比丁角之正弦若壬丁弦與壬癸股一半徑一二丁角六十二度正弦八八二五九三壬丁邊一百二丈二尺四壬癸邊九十丈二尺三寸右例以邊求角而先知方角故止用二邊此先有之邊是弦與勾故求壬癸邊之股者以壬丁邊之斜弦為比而正弦如股半徑旋轉如弦可線與線相比以為邊與邊相比之例也若先有者是股邊勾邊則求切線者以股邉為例而勾之比股者又可以半徑為勾如下求丁角法假如壬癸丁三角形有壬丁邊一百六丈壬癸邊九十丈癸丁邊五十六丈求角求癸角以壬丁大邊與丁癸邊相加得一百六十二丈為總又相減得五十丈為較以較乘總得八千一百丈為實以壬癸邊九十丈為法除之仍得九十丈與壬癸邊數等即知癸角為正方角求丁角以丁癸邊比壬癸邊若半徑與丁角切線一丁癸勾五十六丈二壬癸股九十丈三半徑一四丁角切線一六七一四以所得切線檢表得五十八度六分為丁角有一角必有一弧每一弧必有八線今求丁角而壬癸邊如丁角弧之切線可以半徑相比故先以丁癸邊比壬癸邊為例若半徑與丁角之切線求壬角以丁角五十八度六分與象限相減得餘三十一度五十四分為壬角右例亦以邊求角而先不知其為勾股形故兼用三邊鋭角有兩角一邊求餘角餘邊鋭角之一假如乙丙丁鋭角有丙角六十度丁角五十度丙丁邊一百二十尺求乙角以丙角六十度丁角五十度相併得一百一十度以減半周一百八十度餘七十度為乙角右丙角丁角有度而無邊乙角有邊而無度先以兩角之度除半周而乙角之弧度得矣既得乙角之度即可以乙角之線比乙角相對之邊若他角之線與他角之邊求乙丁邊以乙角正弦比丙丁邊若丙角正弦與乙丁邊一乙角七十度正弦九三九六九二丙丁邊即乙角對邊一百二十尺三丙角六十度正弦八六六三四乙丁邊即丙角對邊一百一十尺六寸以前諸法俱線比線邊比邊互相為例此處以線比邊下求乙丙邊同求乙丙邊以乙角正弦比丙丁邊若丁角正弦與乙丙邊一乙角七十度正弦九三九六九二丙丁乙角對邊一百二十尺三丁角五十度正弦七六六四四乙丙丁角對邊九十七尺八寸右例先有之邊在兩角之間也若先有之邊與一角相對亦同有一角兩邊求餘角餘邊鋭角之二假如甲乙丙鋭角形有丙角六十度甲丙邊八千尺甲乙邊七千三十四尺求乙角以甲乙邊比甲丙邊若丙角正弦與乙角正弦一甲乙邊七千三十四尺二甲丙邊八千尺三丙角六十度正弦八六六三四乙角正弦九八四九六檢表得八十度三分為乙角凡角俱有正弦下垂角小弦亦小角大弦亦大依割線之低昻也今丙角斜邊長近俯乙角斜邊短近仰則乙角必大於丙角故以小邊比大邊亦若正弦小之比大而可得角也此以小比大也求甲角以丙角乙角相併得一百四十度三分以減半周餘三十九度五十七分為甲角求乙丙邊以乙角之正弦比甲角之正弦若甲丙邊與乙丙邊一乙角八十度三分正弦九八四九六二甲角三十九度五十七分正弦六四二一二三甲丙乙角對邊八千尺四乙丙甲角對邊五千二百一十五尺乙角以乙丙為底其正弦從甲下垂故弦長甲角以甲丙為底正弦從乙下垂故弦短今乙丙邊小於甲乙甲丙之兩邊故以最大之邉比之先以最大之線比最小之線用乙角甲角之正弦為例也右例有兩邊一角而角與一邊相對假如甲乙丙鋭角形有甲丙邊四百尺乙丙邊二百六十一尺八分丙角六十度角在兩邊之中不與邊對求甲乙邊先求中長線分為兩勾股形以半徑比丙角正弦若甲丙邊與甲丁中長線此下四則皆為求甲乙邊與甲全角故先求分形之邊及分形之角一半徑一二丙角六十度正弦八六六三三甲丙邊四百尺四甲丁中長線三百四十六尺四寸一分求丙丁邊求中長線專為分邊而求以半徑比丙角餘弦若甲丙邊與丙丁邊一半徑一二丙角六十度餘弦五三甲丙邊四百尺四丙丁邊二百尺求角者須先審四率之線應求某線而以邊之可比例者為一二率求邊者須先審二率應用某線可與四率之邊相比例而以一率三率比之盖邊有定在而線則隨所比例而變其所取也如右求丙丁邊乃分邊而非乙丙之全邊妙在八線餘弦限於正弦而不越於正弦之外與丁丙分邊限於中長線甲丁不能越丁而至乙故二率取為比例而得丙丁之分邊求乙丁邊以丙丁與丙乙相減餘六十一尺八分為乙丁求丁甲乙分角以甲丁中長線比乙丁分邊若半徑與甲分角切線一甲丁中長線三百四十六尺四寸一分二乙丁分邊六十一尺八分三半徑一四甲分角切線一七六三三檢切線表得一十度為甲分角右求分角之線自必以分邊為例則所得之線乃分角之線而非甲全角之線惟切線即在角之對邊故分邊之線為分角之度求甲乙邊以半徑比甲分角割線若甲丁中長線與甲乙邊一半徑一二甲分角十度割線一一五四三三甲丁中長線三百四十六尺四寸一分四甲乙邊三百五十一尺七寸五分右甲分角以中長線為底則割線即甲乙邊求甲全角以丙角六十度之餘角三十度即分形甲丁丙之甲分角與求得甲分角一十度相併得四十度為甲全角求乙角以甲分角一十度減象限得八十度為乙角或併丙甲二角減半周同右例有兩邊一角而角在兩邊之中不與邊對故用分形以取勾股用切線分外角梅本新増假如甲乙丙鋭角形有甲丙邊四百尺乙丙邊二百六十一尺八分丙角六十度求甲角以甲丙邊乙丙邊相併為總相減為較又以丙角六十度減半周得外角一百二十度半之得半外角六十度檢其切線依三率法求得半較角以減半外角得甲角一兩邊總六百六十一尺八分二兩邊較一百三十八尺九寸三分三半外角切線一七三二五四半較角切線三六三九七檢切線表得二十度為半較角轉與半外角六十度相減得甲角四十度求乙角以甲丙二角相併共一百度以減半周得餘八十度為乙角求甲乙邊以甲角四十度正弦六四二七九比丙角六十度正弦八六六三若乙丙邊二百六十一尺八分與甲乙邊三百五十一尺七寸五分按此新増例即前有一角兩邊而角在邊中不與邊對之三角也但此不用求分邊分角之煩而徑求甲角之半較角葢一弧之中既有丙角則所餘之度皆甲乙之角為丙之外角應將外角中分為半外角以為甲乙兩角之地然甲角邊長鋭於乙角則乙角必大甲角必小又應於外角之半分出較角而後甲角始得其真在半外角既中分外角之半則此較角亦必中分較角之半為半較角故先以邊總比邊較為一二率蓋邊總如半外角之總猶之外角一百二十而半外角止六十也以邊較求甲角之半較角猶甲角小於乙角若干而此求得之較為小於乙角若干之半名半較角也所以求切線者盖切線在各弧之貼際必與本角之底為直角形如勾股其線遇本角之割線而止今所求在所割之半較角則莫如半外角之切線比半較角之切線同在弧之貼際不煩更覓他線也梅刻増此一條簡捷巧便而所以然之理初學茫然為補圖明之如左此平三角借弧以明其理若弧三角所容三角不止三個如平方立方有面體之别後同有三邊求角鋭角之三假如甲乙丙鋭角形有乙丙邊二十丈甲丙邊一十七丈五尺八寸五分乙甲邊一十三丈五寸求兩勾相減之數為勾較任以乙丙大邊為底從甲角作甲丁虚垂線至底分為兩勾股形一甲丁丙形以甲丙邊為弦丁丙為勾一甲丁乙形以甲乙邊為弦丁乙為勾兩弦相併為總相減為較兩勾相併即乙丙邊原數為勾總求戊丙勾較以勾總比弦總若弦較與勾較一兩勾之總即乙丙二十丈二兩弦之總三十丈六尺三寸五分三兩弦之較四丈五尺三寸五分四兩勾之較即丙戊六丈九尺四寸六分此欲求丙角而甲乙角無度則無線可比止乙至丙之勾似丙角之餘弦然餘弦長短必限於正弦今甲丁中垂線即丙角之正弦今若求丙角餘弦又多乙丁勾之長故先求勾較之丙戊既得勾較則可加分形之勾戊丁而得丁丙分邊與丙角之餘弦等以之比例而得丙角之餘弦即查表得丙角之度求分形之兩勾以勾較六丈九尺四寸六分減勾總二十丈即乙丙餘乙戊一十三丈五寸四分半之得丁乙即戊丁六丈五尺二寸七分為甲丁乙分勾之形又以戊丁六丈五尺二寸七分加勾較六丈九尺四寸六分即戊丙得丁丙一十三丈四尺七寸三分為甲乙丙分勾之形求丙角以甲丙弦比丁丙勾若半徑與丙角餘弦一甲丙邊一十七丈五尺八寸五分二丁丙分邊一十三丈四尺七寸三分三半徑一四丙角餘弦七六六一六檢餘弦表得丙角四十度求甲角先求分形大半之甲角以丙角四十度減象限餘五十度為丁甲丙分形甲角次求分形小半之甲角以甲乙弦比丁乙勾若半徑與分形甲角之正弦一甲乙邊一十三丈五寸二丁乙分邊六丈五尺二寸七分三半徑一四甲分角正弦五一五以甲丁為底則甲乙邊如半徑而乙丁邊如甲分角之正弦檢正弦表得三十度為丁甲乙分形之甲角併分形兩甲角先得五十度次得三十度得共八十度為甲全角求乙角併丙甲二角共一百二十度以減半周得餘六十度為乙角鈍角有兩角一邊求餘角餘邊鈍角之一假如乙丙丁鈍角形有丙角三十六度半乙角二十四度丁乙邊五十四丈求丁角以丙丁二角併共六十度半以減半周得餘一百一十九度半為丁鈍角求乙丙邊以丙角正弦比丁角正弦若乙丁邊與乙丙邊一丙角三十六度三十分正弦五九四八二二丁角一百十九度三十分正弦八七三六三乙丁邊五十四丈四乙丙邊七十九丈一寸右所用丁角正弦即六十度半正弦以鈍角度減半周用之凡鈍角同求丁丙邊以丙角正弦比乙角正弦若乙丁邊與丁丙邊一丙角三十六度三十分正弦五九四八二二乙角二十四度正弦四六七四三乙丁邊五十四丈四丁丙邊三十六丈九尺二寸凡鈍角以外角之正弦為正弦蓋即此鈍角之外角也如圖丁為鈍角乙丙為丁角所對之弧乙丁甲為丁角之外角至於正弦皆以本角之勾為底以割線半徑同與弧之相界處直線垂下與本角之底為正方直角如圖乙丁甲為丁角之外角乙丁如外角之割線夘丁如外角之餘弦而夘乙則外角之正弦也至如丙角以丙丁為底其正弦丑丁近乙丁邊乙角以乙丙為底其正弦子丁近乙丙邊也補圖明之有一角兩邊求餘角餘邊鈍角之二假如甲乙丙角有乙角九十九度五十七分鈍角形此鈍角所對之弧度分甲丙邊四千尺甲乙邊三千五百一十七尺前則用他角求鈍角此則用鈍角求他角乙角為鈍角甲丙為鈍角所對之弧度乙丁為丙角正弦甲戊為鈍角用外角之正弦求丙角以甲丙邊比甲乙邊若乙角正弦與丙角正弦一甲丙邊四千尺二甲乙邊三千五百一十七尺三乙角九十九度五十七分正弦九八四九六即八十度三分正度四丙角正弦八六六三檢表得丙角六十度按乙角為鈍角其所用外角之正弦即鈍角九十九度五十七分減半周一百八十度所餘八十度三分之外角其所有之正弦也每度六十分求丙角者止丁外角之正弦可比丙角之正弦故先以甲丙邊比甲乙邊為例俱以長比短而縱與縱為同類求甲角併乙丙二角共一百五十九度五十七分以減半周得餘二十度三分為甲角求乙丙邊以乙角之正弦比甲角正弦若甲丙邊與乙丙邊一乙角九十九度五十七分正弦九八四六九二甲角二十度三分正弦三四二八四三甲丙邊四千尺四乙丙邊一千三百九十二尺右甲角正弦以甲丙為底乙已即甲角正弦與甲已為正方角此二則皆以大比小右例有兩角一邊而先有對角之邊若兩邊一角而邊在角之兩旁不與角對又另法如左假如乙丁丙鈍角形有乙丁邊一千八十尺乙丙邊一千五百八十二尺乙角二十四度丙戊為虚股戊丁為虚勾乙角乙丁為底丑丁為正弦乙丁即餘弦丙角丙丁為底子丁為正弦先以半徑比乙角正弦若乙丙邊與丙戊邊一半徑一二乙角二十四度正弦四六七四三乙丙邊一千五百八十二尺四丙戊邊即虚垂線六百四十三尺又以半徑比乙角餘弦若乙丙邊與乙戊一半徑一二乙角二十四度餘弦九一三五五三乙丙邊一千五百八十二尺四乙戊邊即乙丁引長線一千四百四十五尺右以原邊乙丁一千八十尺與引長乙戊邊相減得丁戊三百六十五尺為形外所作虚勾股形之勾先得丙戊垂線為股原有邊之丁丙為弦求丁丙邊依勾股求弦法以丙戊股自乘四十一萬三千四百四十九尺丁戊勾自乘一十三萬三千二百二十五尺併之得數五十四萬六千六百七十四尺為實平方開之得弦七百三十九尺為丁丙邊求丙角以丁丙邊比丁乙邊若乙角正弦與丙角正弦一丁丙邊七百三十九尺二丁乙邊一千八十尺三乙角二十四度正弦四六七四四丙角正弦五九四四二檢表得丙角三十六度二十九分求丁角以丙乙二角併之共六十度二十九分以減半周得餘一百一十九度三十一分為丁鈍角此三角形既有乙角度當先求丙角之鋭而後丁角之鈍可以半周相減即得但求丙角雖有乙丁邊可為丙角正弦之比例凡正弦必在本角相對之邊然丙丁無邊不能以邊比邊為乙角正弦比丙角正弦之例故又當先求丙丁邊但丙丁邊如勾股之斜弦當以勾股求弦法求之今丁戊無勾丙戊無股故先求丙戊邊以作虚股再求乙戊邊以作虚勾而後用勾股求弦法而得丙丁之邊三邊既得則每角之正弦必近本角所對之邊即可以所對之兩邊相比為兩角之正弦相比之例求之矣葢丙角以丙丁為底其正弦子丁近乙丁邊而乙角之正弦子丑近丙丁邊故必先得邊以為求線之比例也既先有乙角又求得丙角則丁角半周減之即得矣右兩邊一角而角不與邊對用切線分外角梅本新増假如乙丁丙鈍角形有乙丁邊五百四十尺丙乙邊七百九十一尺乙角二十四度求丙角以丁乙丙乙兩邊相併為總相減為較又以乙角二十四度減半周得外角一百五十六度半之得半外角七十八度以邊總比邊較若半外角切線與半較角切線一兩邊之總一千三百三十一尺二兩邊之較二百五十一尺三半外角切線四七四六三四半較角切線八八七一九檢表得半較角四十一度三十五分以減半外角七十八度得餘三十六度二十五分為丙角求丁角併乙丙二角共六十度二十五分以減半周得一百一十九度三十五分為丁鈍角求丁丙邊以丙角正弦比乙角正弦若乙丁邊與丁丙邊一丙角三十六度二十五分正弦五九三六五二乙角二十四度正弦四六七四三乙丁邊五百四十尺四丁丙邊三百六十九尺九寸八分右新増一則亦角在兩邊之中不與邊對與前三角形無異亦俱先求丙角前法先以勾股求弦法求丙丁邊先補虚勾虚股以求丙丁邊邊得而丙角之線可比例以求丙角其法詳此新増法竟求丙角而求丙丁邊反在求得丙角之後更簡捷矣其邊總邊較半外角切線與半較角切線補圖明之如左甲庚癸為半周子庚為半徑甲壬為乙角度壬辛癸為外角壬辛為半外角割子夘為半外角線夘為半外角切壬線丑為半較角切己線辛為半較角己新式三邊求角鈍角之三假如乙丙丁鈍角形有乙丙邊三百五十尺乙丁邊六百七尺丁丙邊三百尺右有邊無角術自乙角作虚垂線至甲又引丁丙線横出遇於甲而成正方形為乙甲丁勾股形又横線至辛如丙甲成乙甲辛勾股形丁辛為兩勾之總丁丙邊為兩勾之較乙丁邊為大形乙甲丁之弦乙丙邊為小形乙甲辛即乙甲丙之弦兩弦相併為總相減為較先求勾總此因將求丁角度而三角無度則無線可比唯丙丁句似丁角餘弦然丁角以乙丁為半徑則乙甲為正弦而餘弦應自丁至甲今止自丁至丙尚少丙甲之餘弦故必先求甲丁勾始與丁角餘弦相等然欲求甲丁勾又必先求勾總以為分形之勾股而後甲丁之勾可比得丁角之餘弦以查表而得丁角也一勾較即丁丙邊三百尺二弦較即乙丁邊減乙丙之餘二百三十二尺三弦總即乙丁乙丙二邊相併九百八十二尺四勾總即丁辛七百五十九尺四寸以勾較三百尺減所得勾總七百五十九尺四寸餘數四百五十九尺四寸半之得數二百二十九尺七寸為小形之勾甲丙以甲丙小形之勾加丁丙較三百尺得數五百二十九尺七寸為大形之勾甲丁求丁角以乙丁弦比丁甲勾若半徑與丁角之餘弦一乙丁弦六百七尺二甲丁勾五百二十九尺七寸三半徑一四丁角餘弦八七二六五檢表得丁角二十九度一十四分求丙角用乙甲丙小形鈍角用外角故用乙甲丙之小形勾股此勾股之弦乙丙即此鈍角丙之外角割線以甲丙勾比乙丙弦若半徑與丙角之割線一甲丙勾二百二十九尺七寸二乙丙弦三百七十五尺三半徑一四丙角割線一六三二五六檢表得丙角五十二度一十四分為本形之丙外角以減半周得丙鈍角一百二十七度四十六分按此五十二度一十四分乃丙外角之度分故乙丙斜弦實即丙角之割線至於求丁角求丙角俱以半徑為三率而丁角之三率用以作弦丙角之三率用以作勾半徑可勾可股可弦顧隨所取用耳求乙角併丁丙二角所得度分共一百五十七度以減半周得餘二十三度為乙角右例鈍角形三邊求角作垂線於形外徑求鈍角乃新式也若以大邊為底從鈍角分中長線同鋭角之三補圖乙丙丁三角形乙己為丙角弧度乙辛為丙外角丙戊即乙丙為丙外角割線乙壬壬辛為外角之丁角乙角乙甲即中長線乙甲丙即小形勾股乙甲丁即大形勾股乙丙即虚勾虚股之弦戊辛為切線右鈍角用割線宣城梅定九先生新増此式為割線求度分之法盖割線乃象限中所割各度之線必與切線相遇以為増減割線割於弧内切線切於弧外彼増此減彼減此増如前鈍角之二己辛為半較角其切線即從己之弧外起今外角乙辛即從辛之弧外起此新式之用割線視前法無異也至鈍角之所以用外角者蓋大圜兩分之為半周四分之為象限凡象限止九十度而自一度至四十四度為平度自四十五度至八十九度為髙度其髙度之正線即平度之餘線而髙度之餘線即平度之正線故四十四與四十五同表四十三與四十六同表以至度分則與八十九度六十分同表此作八線表者因髙度平度如測望之直景倒景相反而實相通為此省文也今凡鈍角度必過象限之外在八線無半弧之表可查則用外角之線度以減半弧而所餘之度即鈍角所對之弧度明矣此因八線表而立鈍角用外角之法也勾股引䝉卷四
